name: 每日股票分析

on:
  schedule:
    - cron: '30 0 * * 1-5'  # 北京时间 8:30
  workflow_dispatch:  # 允许手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: 安装依赖
      run: |
        pip install akshare pandas google-generativeai requests tenacity
    
    - name: 运行分析
      env:
        # AI配置
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        
        # 股票配置
        MY_STOCKS: ${{ secrets.MY_STOCKS }}
        PRICE_LIMIT: ${{ secrets.PRICE_LIMIT || '10' }}
        MAX_LOW_PRICE_STOCKS: ${{ secrets.MAX_LOW_PRICE_STOCKS || '5' }}
        
        # 新闻配置
        TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
        
        # 邮件配置
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        
      run: python main.py
